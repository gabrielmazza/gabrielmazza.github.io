<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando... - Gabriel Mazza</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Componente Header -->
    <div id="header-component"></div>

    <main class="container py-section page-intro">
        <!-- Navegação Injetada via JS -->
        <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb"></nav>
        <div id="back-top" class="mt-6"></div>

        <!-- Os Titulos vem do data.json pelo ID passado na barra de Endereçamento do navegador  -->
        <p id="categoria-kicker" class="kicker"></p>
        <h1 id="categoria-titulo">Carregando...</h1>
        <p id="categoria-descricao" class="lead"></p>
        
        <!-- Aqui os sub-blocos e Projetos Serão inseridos dinamicamente pelo script.js-->
        <div id="projetos-container" class="editorial-rule mt-12" style="padding-top:2.5rem;">
           <!-- Subcategorias Serão Renderizadas Aqui Pelo Script-->
        </div>
    </main>

    <!-- Componente Footer -->
    <div id="footer-component"></div>

    <!-- Inicializa Módulos -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
